<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Where Our Story Began 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#F8F5F2;

font-family:'Quicksand',sans-serif;

display:flex;
justify-content:center;
align-items:center;

padding:50px 20px;

}

.paper{

width:900px;
max-width:100%;

background:#FFFDF9;

padding:70px 60px;

border-radius:12px;

box-shadow:0 15px 35px rgba(0,0,0,.08);

position:relative;

border:1px solid #eee;

animation:fade .8s;

}

/* Notebook holes */

.paper::before{

content:"";

position:absolute;

left:-14px;
top:40px;

width:12px;
height:12px;

background:white;

border-radius:50%;

box-shadow:
0 55px white,
0 110px white,
0 165px white,
0 220px white,
0 275px white,
0 330px white;

border:1px solid #ddd;

}

/* Washi tape */

.tape{

width:140px;
height:35px;

background:rgba(212,191,233,.45);

position:absolute;

top:-12px;
left:50%;

transform:translateX(-50%) rotate(-2deg);

border-radius:4px;

}

.date{

text-align:center;

color:#9F8BB5;

letter-spacing:4px;

font-size:13px;

margin-bottom:15px;

}

h1{

font-family:'Caveat',cursive;

font-size:62px;

text-align:center;

color:#735D78;

margin-bottom:15px;

}

.line{

width:180px;
height:2px;

background:#DCC9F3;

margin:20px auto 40px;

}

.content{

font-size:20px;

line-height:2.1;

color:#565656;

min-height:350px;

}

.signature{

margin-top:40px;

text-align:right;

font-family:'Caveat';

font-size:34px;

color:#8D78AA;

}

button{

display:block;

margin:45px auto 0;

padding:15px 38px;

border:none;

border-radius:40px;

background:#CAB4DB;

color:white;

font-size:18px;

font-family:'Quicksand';

cursor:pointer;

transition:.3s;

}

button:hover{

background:#B498D5;

transform:translateY(-3px);

}

button a{

color:white;

text-decoration:none;

}

.footer{

margin-top:35px;

text-align:center;

font-size:14px;

color:#B7A3C8;

}

@keyframes fade{

from{

opacity:0;
transform:translateY(25px);

}

to{

opacity:1;
transform:translateY(0);

}

}

</style>

</head>

<body>

<div class="paper">

<div class="tape"></div>

<div class="date">

05 • MONTH • YEAR

</div>

<h1>

Where Our Story Began 🤍

</h1>

<div class="line"></div>

<div class="content">

<!-- WRITE YOUR STORY HERE -->

</div>

<div class="signature">

~ Nin Chinnii 🤍

</div>

<button>

<a href="../day8/">

🌸 Continue →

</a>

</button>

<div class="footer">

Made with love • Dear Love

</div>

</div>

</body>

</html>
