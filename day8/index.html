<!DOCTYPE html>
<html lang="en">

<head>
  
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>You're Literally Everywhere 🤍</title>

<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

background:#DDD0F3;

font-family:'Quicksand',sans-serif;

display:flex;
justify-content:center;
align-items:center;

padding:30px 15px;

min-height:100vh;

}

.paper{

width:950px;
max-width:100%;

background:#FFFDF9;

padding:50px 30px 60px;

border-radius:18px;

box-shadow:0 15px 35px rgba(0,0,0,.08);

position:relative;

overflow:hidden;

animation:fade .8s;

}

.tape{

width:130px;
height:34px;

background:rgba(212,191,233,.45);

position:absolute;

top:-12px;
left:50%;

transform:translateX(-50%) rotate(-3deg);

border-radius:5px;

}

h1{

font-family:'Caveat',cursive;

font-size:60px;

text-align:center;

color:#735D78;

margin-top:10px;
margin-bottom:20px;

line-height:1.2;

}

.intro{

text-align:center;

font-size:19px;

line-height:1.8;

color:#666;

max-width:620px;

margin:0 auto 45px;

}

.board{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(75px,1fr));

gap:28px;

justify-items:center;

align-items:center;

}

.item{

font-size:42px;

cursor:pointer;

transition:.25s;

user-select:none;

}

.item:hover{

transform:rotate(-8deg) scale(1.18);

}

.footer{

margin-top:45px;

font-size:20px;

font-family:'Quicksand',sans-serif;

color:#565656;

text-align:left;

line-height:1.8;

}

.signature{

margin-top:35px;

text-align:right;

font-family:'Caveat';

font-size:34px;

color:#8D78AA;

}

.overlay{

position:fixed;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,.35);

display:none;

justify-content:center;
align-items:center;

padding:20px;

z-index:999;

}

.popup{

background:#F3E4C7;

width:85%;
max-width:340px;

padding:30px 24px;

border-radius:6px;

border:1px solid #D6C4A4;

box-shadow:
0 18px 30px rgba(0,0,0,.18),
0 2px 6px rgba(0,0,0,.08);

position:relative;

text-align:center;

transform:rotate(-1deg);

background-image:
repeating-linear-gradient(
to bottom,
transparent,
transparent 29px,
rgba(0,0,0,.06) 30px
);

animation:popup .3s;

}
  
.popupTape{

position:absolute;

top:-12px;

left:50%;

transform:translateX(-50%) rotate(-4deg);

width:90px;

height:24px;

background:rgba(255,236,170,.65);

border:1px solid rgba(0,0,0,.08);

}

.popupIcon{

font-size:48px;

margin-bottom:18px;

}

.popupText{

font-size:19px;

line-height:1.8;

color:#555;

}

.backBtn{

margin-top:28px;

padding:10px 24px;

background:#F3E3C3;

border:2px solid #C4A77D;

border-radius:30px;

font-family:'Quicksand',sans-serif;

font-size:15px;

cursor:pointer;

transition:.25s;

}

.backBtn:hover{

background:#EFD7A8;

transform:translateY(-2px);

}
  
@keyframes popup{

from{

transform:scale(.8);

opacity:0;

}

to{

transform:scale(1);

opacity:1;

}

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:translateY(0);

}

}

@media(max-width:768px){

.paper{

padding:35px 18px 45px;

}

h1{

font-size:42px;

}

.intro{

font-size:16px;

margin-bottom:35px;

}

.board{

grid-template-columns:repeat(4,1fr);

gap:22px;

}

.item{

font-size:34px;

}

.popup{

width:300px;

padding:25px;

}

.popupText{

font-size:17px;

}

.signature{

font-size:28px;

}

.footer{

font-size:17px;

}

}

</style>

</head>

<div class="overlay" id="overlay">

</div>

<script>

const overlay=document.getElementById("overlay");

const popupIcon=document.getElementById("popupIcon");

const popupText=document.getElementById("popupText");

const closeBtn=document.getElementById("closePopup");

const items=document.querySelectorAll(".item");

items.forEach(item=>{

item.addEventListener("click",()=>{

popupIcon.textContent=item.dataset.icon;

popupText.textContent=item.dataset.message;

overlay.style.display="flex";

});

});

closeBtn.addEventListener("click",()=>{

overlay.style.display="none";

});

overlay.addEventListener("click",(e)=>{

if(e.target===overlay){

overlay.style.display="none";

}

});
</script>

</html>
